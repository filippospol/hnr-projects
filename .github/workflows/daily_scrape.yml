name: Daily NBA Data Scrape

on:
  # schedule:
  #  - cron: '0 5 * * *' 
  workflow_dispatch:

jobs:
  scrape-data:
    runs-on: macos-latest
    # MANDATORY: Grant write permission to push the CSV/Data back to the repo
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          # libxml2 is the main one needed for rvest/xml2 on Mac
          brew install libxml2
          
      - name: Start Tor Network
        run: |
          # Start Tor in the background
          tor &
          sleep 15

      - name: Install R libraries
        run: |
          # Use a standard CRAN mirror compatible with macOS
          options(repos = c(CRAN = "https://cran.rstudio.com/"))
          install.packages(c("tidyverse", "hoopR", "httr", "jsonlite", "rvest", "glue", "janitor", "fuzzyjoin", "plyr"))
        shell: Rscript {0}

      - name: Run scraper script
        run: |
          Rscript hnr-app-scraper.R

      - name: Commit and push new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily NBA stats" && git push origin main)
