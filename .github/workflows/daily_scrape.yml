name: Daily NBA Data Scrape
on:
 # schedule:
 #   - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libxml2-dev libcurl4-openssl-dev libssl-dev tor

      - name: Start Tor and wait for it to be ready
        run: |
          sudo systemctl start tor
          # Wait until Tor's SOCKS port is actually accepting connections
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 9050 2>/dev/null; then
              echo "Tor is ready."
              break
            fi
            echo "Waiting for Tor... ($i)"
            sleep 2
          done

      - name: Install R libraries
        run: |
          options(repos = c(CRAN = "https://cran.rstudio.com/"))
          install.packages(c(
            "tidyverse", "hoopR", "httr", "jsonlite",
            "rvest", "glue", "janitor", "fuzzyjoin", "plyr", "beepr"
          ))
        shell: Rscript {0}

      - name: Run scraper script
        # Tell curl/httr to use Tor's SOCKS5 proxy for ALL outbound requests
        env:
          ALL_PROXY: "socks5h://127.0.0.1:9050"
          HTTPS_PROXY: "socks5h://127.0.0.1:9050"
          HTTP_PROXY: "socks5h://127.0.0.1:9050"
        run: |
          Rscript hnr-app-scraper.R

      - name: Commit and push new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-update daily NBA stats" && git push origin main)
